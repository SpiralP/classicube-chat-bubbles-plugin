name: build

on:
  pull_request:
    branches: [main, master, alpha, beta]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout
  id-token: write # OIDC token for Sigstore signing
  attestations: write # persist build-provenance attestations

jobs:
  linux_nix:
    # Skip when dispatched from release.yml's publish phase: the smoke
    # `build` job already validated nix against this commit minutes earlier,
    # and the nix output isn't attached to the GitHub release.
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@4aa326f7e29b6ce53306ec3f9d46dfa3bd40776e # main

  windows:
    name: Build Windows ${{ matrix.config.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-pc-windows-msvc }
          # - { arch: i686, target: i686-pc-windows-msvc }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@4aa326f7e29b6ce53306ec3f9d46dfa3bd40776e # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}

  linux:
    name: Build Linux ${{ matrix.config.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-unknown-linux-gnu }
          # - { arch: i686, target: i686-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@4aa326f7e29b6ce53306ec3f9d46dfa3bd40776e # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}

  mac:
    name: Build MacOS ${{ matrix.config.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: aarch64, target: aarch64-apple-darwin }
          # - { arch: x86_64, target: x86_64-apple-darwin }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@4aa326f7e29b6ce53306ec3f9d46dfa3bd40776e # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}
